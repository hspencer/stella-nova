<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 148">
	<!--
		Stella Nova — favicon. Autocontenido (doctrina ARCHITECTURE §2): viaja
		con el skin, sin depender de $wgFavicon en LocalSettings. Misma geometría
		que casiopea-icon.svg (la constelación), pero con colores EXPLÍCITOS en
		vez de currentColor: un favicon se renderiza aislado, fuera del DOM, así
		que no hereda variables CSS ni la tinta del tema. Se adapta al esquema de
		color del navegador/SO vía @media prefers-color-scheme (no a la pref del
		skin): tinta oscura sobre pestaña clara, tinta clara sobre pestaña oscura.
	-->
	<style>
		.sn-fav-star { fill: #221f1a; }
		.sn-fav-line { stroke: #221f1a; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; opacity: .45; }
		@media (prefers-color-scheme: dark) {
			.sn-fav-star { fill: #fcfbf7; }
			.sn-fav-line { stroke: #fcfbf7; }
		}
	</style>
	<g transform="matrix(0.892, 0, 0, 0.892, 7.41, 23.33)">
		<g transform="matrix(1.1172, 0, 0, 1.1172, -8.92, -3.72)">
			<path class="sn-fav-line" d="M 22.676 21.837 L 45.501 59.142 L 77.973 52.747 C 77.973 52.747 98.206 93.357 97.975 93.357 C 97.744 93.357 130.013 63.639 130.013 63.639"/>
			<circle class="sn-fav-star" cx="22.613" cy="21.911" r="6"/>
			<circle class="sn-fav-star" cx="45.826" cy="57.671" r="6"/>
			<circle class="sn-fav-star" cx="77.438" cy="52.751" r="6"/>
			<circle class="sn-fav-star" cx="97.134" cy="92.888" r="6"/>
			<circle class="sn-fav-star" cx="129.396" cy="63.714" r="6"/>
		</g>
	</g>
</svg>
